services:
  postgres:
    image: postgres:17-alpine
    container_name: zrule-postgres
    environment:
      POSTGRES_USER: zrule
      POSTGRES_PASSWORD: zrule
      POSTGRES_DB: zrule
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zrule"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
